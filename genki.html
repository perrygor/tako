<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 Genki Status</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0e1a;
  color: #c8d0e0;
  font-family: 'Courier New', monospace;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px 10px;
}

.container {
  max-width: 420px;
  width: 100%;
  background: #111827;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #1e293b;
  box-shadow: 0 0 40px rgba(16, 24, 48, 0.8);
}

/* Header */
.header {
  padding: 16px 20px;
  background: #0f172a;
  border-bottom: 1px solid #1e293b;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-icon { font-size: 24px; }
.header-title {
  font-size: 16px;
  font-weight: bold;
  color: #e2e8f0;
  letter-spacing: 1px;
}
.header-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #22c55e;
  margin-left: auto;
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Scene Area */
.scene-wrapper {
  position: relative;
  height: 280px;
  overflow: hidden;
  transition: background 0.8s ease;
}

.scene {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
}
.scene.active {
  opacity: 1;
  pointer-events: auto;
}

/* Pixel Grid for Lobster */
.pixel-canvas {
  display: inline-grid;
  grid-template-columns: repeat(14, 7px);
  grid-template-rows: repeat(16, 7px);
  gap: 0;
  image-rendering: pixelated;
  position: relative;
  z-index: 2;
}
.pixel-canvas i {
  display: block;
  width: 7px;
  height: 7px;
}
.p-R { background: #e04030; }
.p-r { background: #c03020; }
.p-H { background: #f06050; }
.p-D { background: #a02018; }
.p-e { background: #2a2a4a; }
.p-a { background: #f0c030; }
.p-w { background: #ffffff; }
.p-b { background: #60b0ff; }
.p-o { background: #f08040; }
.p-_ { background: transparent; }

/* Tako pixel (simplified 8x8) */
.tako-canvas {
  display: inline-grid;
  grid-template-columns: repeat(8, 6px);
  grid-template-rows: repeat(8, 6px);
  gap: 0;
  image-rendering: pixelated;
}
.p-P { background: #9b59b6; }
.p-p { background: #7d3c98; }
.p-W { background: #ffffff; }

/* Scene backgrounds */
.scene-computer { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
.scene-tasks { background: linear-gradient(180deg, #1a1a2e 0%, #0d1117 100%); }
.scene-idle { background: linear-gradient(180deg, #1a2332 0%, #1a1a2e 100%); }
.scene-night { background: linear-gradient(180deg, #0a0a1a 0%, #111133 100%); }
.scene-dreaming { background: linear-gradient(180deg, #1a1a2e 0%, #2a1a3e 100%); }
.scene-tako { background: linear-gradient(180deg, #1a1a3e 0%, #1a2a3e 100%); }

/* Props - Desk */
.desk {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 8px;
  background: #5a4a3a;
  border-radius: 2px;
}
.desk-leg-l, .desk-leg-r {
  position: absolute;
  bottom: 4px;
  width: 6px;
  height: 36px;
  background: #4a3a2a;
}
.desk-leg-l { left: 70px; }
.desk-leg-r { right: 70px; }
.monitor {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  width: 70px;
  height: 50px;
  background: #222;
  border: 3px solid #444;
  border-radius: 4px;
  overflow: hidden;
}
.monitor-screen {
  width: 100%;
  height: 100%;
  background: #0a1a0a;
  display: flex;
  flex-direction: column;
  padding: 4px;
  gap: 2px;
}
.screen-line {
  height: 3px;
  background: #22cc44;
  border-radius: 1px;
  animation: type-line 1.5s ease-in-out infinite;
}
.screen-line:nth-child(2) { width: 80%; animation-delay: 0.3s; }
.screen-line:nth-child(3) { width: 60%; animation-delay: 0.6s; }
.screen-line:nth-child(4) { width: 90%; animation-delay: 0.9s; }
.screen-line:nth-child(5) { width: 40%; animation-delay: 1.2s; }
@keyframes type-line {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.monitor-stand {
  position: absolute;
  bottom: 42px;
  left: 50%;
  transform: translateX(-50%);
  width: 10px;
  height: 6px;
  background: #444;
}
.coffee {
  position: absolute;
  bottom: 48px;
  right: 90px;
  width: 14px;
  height: 12px;
  background: #f5f0e0;
  border-radius: 0 0 3px 3px;
}
.coffee-handle {
  position: absolute;
  right: -5px;
  top: 2px;
  width: 5px;
  height: 7px;
  border: 2px solid #f5f0e0;
  border-left: none;
  border-radius: 0 4px 4px 0;
}
.coffee-steam {
  position: absolute;
  top: -8px;
  left: 4px;
  font-size: 8px;
  color: rgba(255,255,255,0.3);
  animation: steam 2s ease-in-out infinite;
}
@keyframes steam {
  0%, 100% { opacity: 0.2; transform: translateY(0); }
  50% { opacity: 0.5; transform: translateY(-4px); }
}

/* Lobster in computer scene - typing animation */
.lobster-computer {
  position: absolute;
  bottom: 56px;
  left: 50%;
  transform: translateX(-50%);
  animation: typing-bob 0.8s ease-in-out infinite;
}
@keyframes typing-bob {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-2px); }
}

/* Props - Server racks */
.server-rack {
  position: absolute;
  bottom: 20px;
  width: 40px;
  height: 140px;
  background: #2a2a3a;
  border: 2px solid #3a3a4a;
  border-radius: 3px;
  display: flex;
  flex-direction: column;
  padding: 6px 4px;
  gap: 4px;
}
.server-rack.rack-1 { left: 30px; }
.server-rack.rack-2 { right: 30px; }
.server-rack.rack-3 { left: 100px; height: 120px; bottom: 20px; }
.server-slot {
  height: 10px;
  background: #1a1a2a;
  border-radius: 1px;
  position: relative;
}
.server-led {
  position: absolute;
  right: 3px;
  top: 3px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  animation: blink-led 1s ease-in-out infinite;
}
.led-green { background: #22cc44; }
.led-yellow { background: #ccaa22; }
.led-red { background: #cc3322; }
@keyframes blink-led {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}
.server-led:nth-child(odd) { animation-delay: 0.5s; }

.lobster-tasks {
  position: absolute;
  bottom: 26px;
  left: 50%;
  transform: translateX(-50%);
  animation: run-around 3s ease-in-out infinite;
}
@keyframes run-around {
  0%, 100% { transform: translateX(-50%) translateX(0); }
  25% { transform: translateX(-50%) translateX(20px); }
  75% { transform: translateX(-50%) translateX(-20px); }
}
.wrench {
  position: absolute;
  top: -5px;
  right: -15px;
  font-size: 14px;
  animation: wrench-spin 2s ease-in-out infinite;
}
@keyframes wrench-spin {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(20deg); }
  75% { transform: rotate(-20deg); }
}

/* Props - Sofa */
.sofa {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  height: 50px;
  background: #4a5568;
  border-radius: 8px 8px 4px 4px;
}
.sofa-back {
  position: absolute;
  top: -25px;
  left: 5px;
  right: 5px;
  height: 30px;
  background: #3a4558;
  border-radius: 8px 8px 0 0;
}
.sofa-arm-l, .sofa-arm-r {
  position: absolute;
  top: -10px;
  width: 20px;
  height: 60px;
  background: #3a4558;
  border-radius: 8px;
}
.sofa-arm-l { left: -8px; }
.sofa-arm-r { right: -8px; }

.lobster-idle {
  position: absolute;
  bottom: 52px;
  left: 50%;
  transform: translateX(-50%) rotate(-15deg);
  animation: idle-breathe 4s ease-in-out infinite;
}
@keyframes idle-breathe {
  0%, 100% { transform: translateX(-50%) rotate(-15deg); }
  30% { transform: translateX(-50%) rotate(-12deg); }
  70% { transform: translateX(-50%) rotate(-18deg); }
}
.zzz {
  position: absolute;
  top: 20px;
  right: 80px;
  font-size: 18px;
  color: rgba(200, 208, 224, 0.6);
  animation: zzz-float 3s ease-in-out infinite;
}
@keyframes zzz-float {
  0% { opacity: 0; transform: translateY(0) scale(0.8); }
  50% { opacity: 0.8; transform: translateY(-20px) scale(1); }
  100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
}
.zzz:nth-child(2) { right: 60px; top: 40px; font-size: 14px; animation-delay: 1s; }
.zzz:nth-child(3) { right: 70px; top: 60px; font-size: 11px; animation-delay: 2s; }

.idle-book {
  position: absolute;
  bottom: 45px;
  right: 85px;
  width: 20px;
  height: 14px;
  background: #e8c170;
  border-radius: 1px;
  transform: rotate(-5deg);
}
.idle-coffee {
  position: absolute;
  bottom: 42px;
  left: 85px;
  width: 12px;
  height: 10px;
  background: #f5f0e0;
  border-radius: 0 0 3px 3px;
}

/* Props - Window / Night */
.window-frame {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 140px;
  border: 6px solid #3a3a4a;
  border-radius: 4px;
  background: #050510;
  overflow: hidden;
}
.window-cross-h {
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 4px;
  background: #3a3a4a;
  transform: translateY(-50%);
}
.window-cross-v {
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 4px;
  background: #3a3a4a;
  transform: translateX(-50%);
}
.moon {
  position: absolute;
  top: 15px;
  right: 20px;
  width: 30px;
  height: 30px;
  background: #f0e68c;
  border-radius: 50%;
  box-shadow: 0 0 15px rgba(240, 230, 140, 0.4);
}
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.lobster-night {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
}
.windowsill {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  height: 10px;
  background: #3a3a4a;
  border-radius: 2px;
}

/* Props - File cabinet / Dreaming */
.file-cabinet {
  position: absolute;
  bottom: 25px;
  width: 50px;
  height: 100px;
  background: #4a5568;
  border: 2px solid #5a6578;
  border-radius: 3px;
}
.file-cabinet.cab-l { left: 60px; }
.file-cabinet.cab-r { right: 60px; }
.cabinet-drawer {
  height: 30px;
  border-bottom: 1px solid #5a6578;
  position: relative;
}
.cabinet-handle {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 14px;
  height: 3px;
  background: #8a8a9a;
  border-radius: 1px;
}
.floating-doc {
  position: absolute;
  width: 16px;
  height: 20px;
  background: #f5f0e0;
  border-radius: 1px;
  animation: float-doc 4s ease-in-out infinite;
}
.floating-doc::after {
  content: '';
  position: absolute;
  top: 4px;
  left: 3px;
  right: 3px;
  height: 2px;
  background: #ccc;
  box-shadow: 0 4px 0 #ccc, 0 8px 0 #ccc;
}
@keyframes float-doc {
  0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
  50% { transform: translateY(-15px) rotate(5deg); opacity: 1; }
}
.floating-doc:nth-child(2) { animation-delay: 1.3s; }
.floating-doc:nth-child(3) { animation-delay: 2.6s; }

.lobster-dreaming {
  position: absolute;
  bottom: 35px;
  left: 50%;
  transform: translateX(-50%);
  animation: organize 2s ease-in-out infinite;
}
@keyframes organize {
  0%, 100% { transform: translateX(-50%) rotate(0deg); }
  25% { transform: translateX(calc(-50% + 10px)) rotate(3deg); }
  75% { transform: translateX(calc(-50% - 10px)) rotate(-3deg); }
}

/* Tako scene */
.lobster-tako {
  position: absolute;
  bottom: 50px;
  left: calc(50% - 60px);
  animation: sway-l 3s ease-in-out infinite;
}
@keyframes sway-l {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(3deg); }
}
.tako-sprite {
  position: absolute;
  bottom: 54px;
  left: calc(50% + 20px);
  animation: sway-r 3s ease-in-out infinite;
}
@keyframes sway-r {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(-3deg); }
}
.tako-heart {
  position: absolute;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  animation: heart-float 2s ease-in-out infinite;
}
@keyframes heart-float {
  0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
  50% { opacity: 1; transform: translateX(-50%) translateY(-8px); }
}
.ground-line {
  position: absolute;
  bottom: 45px;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  height: 3px;
  background: #2a3a4a;
  border-radius: 2px;
}

/* Status Bar */
.status-bar {
  padding: 14px 20px;
  border-top: 1px solid #1e293b;
  background: #0f172a;
}
.status-main {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  color: #e2e8f0;
  margin-bottom: 6px;
}
.status-emoji { font-size: 18px; }
.status-label { font-weight: bold; }
.status-time {
  font-size: 12px;
  color: #64748b;
}

/* Tako Bar */
.tako-bar {
  padding: 12px 20px;
  border-top: 1px solid #1e293b;
  background: #111827;
}
.tako-title {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 4px;
}
.tako-stats {
  font-size: 12px;
  color: #64748b;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.tako-stat {
  display: flex;
  align-items: center;
  gap: 3px;
}

/* Sync Bar */
.sync-bar {
  padding: 10px 20px;
  border-top: 1px solid #1e293b;
  background: #0f172a;
  font-size: 11px;
  color: #475569;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sync-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
}
.sync-dot.error { background: #ef4444; }

/* Scene label overlay */
.scene-label {
  position: absolute;
  bottom: 8px;
  right: 12px;
  font-size: 10px;
  color: rgba(200, 208, 224, 0.4);
  letter-spacing: 1px;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <span class="header-icon">🦞</span>
    <span class="header-title">Genki Status</span>
    <div class="header-dot" id="headerDot"></div>
  </div>

  <!-- Scene Display -->
  <div class="scene-wrapper" id="sceneWrapper">

    <!-- Scene: computer -->
    <div class="scene scene-computer active" id="scene-computer">
      <div class="desk">
        <div class="desk-leg-l"></div>
        <div class="desk-leg-r"></div>
      </div>
      <div class="monitor-stand"></div>
      <div class="monitor">
        <div class="monitor-screen">
          <div class="screen-line"></div>
          <div class="screen-line"></div>
          <div class="screen-line"></div>
          <div class="screen-line"></div>
          <div class="screen-line"></div>
        </div>
      </div>
      <div class="coffee" style="position:absolute;bottom:48px;right:100px;">
        <div class="coffee-handle"></div>
        <div class="coffee-steam">~</div>
      </div>
      <div class="lobster-computer" id="lobster-computer"></div>
      <div class="scene-label">computer</div>
    </div>

    <!-- Scene: tasks -->
    <div class="scene scene-tasks" id="scene-tasks">
      <div class="server-rack rack-1">
        <div class="server-slot"><div class="server-led led-green"></div></div>
        <div class="server-slot"><div class="server-led led-yellow"></div></div>
        <div class="server-slot"><div class="server-led led-green"></div></div>
        <div class="server-slot"><div class="server-led led-red"></div></div>
        <div class="server-slot"><div class="server-led led-green"></div></div>
      </div>
      <div class="server-rack rack-2">
        <div class="server-slot"><div class="server-led led-green"></div></div>
        <div class="server-slot"><div class="server-led led-green"></div></div>
        <div class="server-slot"><div class="server-led led-yellow"></div></div>
        <div class="server-slot"><div class="server-led led-green"></div></div>
        <div class="server-slot"><div class="server-led led-red"></div></div>
      </div>
      <div class="server-rack rack-3">
        <div class="server-slot"><div class="server-led led-green"></div></div>
        <div class="server-slot"><div class="server-led led-yellow"></div></div>
        <div class="server-slot"><div class="server-led led-green"></div></div>
        <div class="server-slot"><div class="server-led led-green"></div></div>
      </div>
      <div class="lobster-tasks" id="lobster-tasks">
        <span class="wrench">🔧</span>
      </div>
      <div class="scene-label">tasks</div>
    </div>

    <!-- Scene: idle -->
    <div class="scene scene-idle" id="scene-idle">
      <div class="sofa">
        <div class="sofa-back"></div>
        <div class="sofa-arm-l"></div>
        <div class="sofa-arm-r"></div>
      </div>
      <div class="lobster-idle" id="lobster-idle"></div>
      <div class="idle-book"></div>
      <div class="idle-coffee"></div>
      <div class="zzz">zzZ</div>
      <div class="zzz">zZ</div>
      <div class="zzz">z</div>
      <div class="scene-label">idle</div>
    </div>

    <!-- Scene: night -->
    <div class="scene scene-night" id="scene-night">
      <div class="window-frame">
        <div class="moon"></div>
        <div class="star" style="top:20px;left:15px;"></div>
        <div class="star" style="top:40px;left:40px;animation-delay:0.7s;"></div>
        <div class="star" style="top:15px;left:70px;animation-delay:1.4s;"></div>
        <div class="star" style="top:50px;left:100px;animation-delay:0.3s;"></div>
        <div class="star" style="top:25px;left:55px;animation-delay:1s;"></div>
        <div class="star" style="top:60px;left:25px;animation-delay:1.8s;"></div>
        <div class="window-cross-h"></div>
        <div class="window-cross-v"></div>
      </div>
      <div class="windowsill"></div>
      <div class="lobster-night" id="lobster-night"></div>
      <div class="scene-label">night</div>
    </div>

    <!-- Scene: dreaming -->
    <div class="scene scene-dreaming" id="scene-dreaming">
      <div class="file-cabinet cab-l">
        <div class="cabinet-drawer"><div class="cabinet-handle"></div></div>
        <div class="cabinet-drawer"><div class="cabinet-handle"></div></div>
        <div class="cabinet-drawer"><div class="cabinet-handle"></div></div>
      </div>
      <div class="file-cabinet cab-r">
        <div class="cabinet-drawer"><div class="cabinet-handle"></div></div>
        <div class="cabinet-drawer"><div class="cabinet-handle"></div></div>
        <div class="cabinet-drawer"><div class="cabinet-handle"></div></div>
      </div>
      <div class="floating-doc" style="top:30px;left:120px;"></div>
      <div class="floating-doc" style="top:50px;right:100px;animation-delay:1.3s;"></div>
      <div class="floating-doc" style="top:70px;left:160px;animation-delay:2.6s;"></div>
      <div class="lobster-dreaming" id="lobster-dreaming"></div>
      <div class="scene-label">dreaming</div>
    </div>

    <!-- Scene: tako -->
    <div class="scene scene-tako" id="scene-tako">
      <div class="ground-line"></div>
      <div class="lobster-tako" id="lobster-tako"></div>
      <div class="tako-sprite" id="tako-sprite"></div>
      <div class="tako-heart">💜</div>
      <div class="scene-label">tako</div>
    </div>

  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-main">
      <span class="status-emoji" id="statusEmoji">💬</span>
      <span class="status-label" id="statusLabel">回复中...</span>
    </div>
    <div class="status-time">
      <span>⏰ 最后活跃：</span>
      <span id="lastActive">--:--</span>
    </div>
  </div>

  <!-- Tako Bar -->
  <div class="tako-bar">
    <div class="tako-title">🐙 Tako</div>
    <div class="tako-stats" id="takoStats">
      <span class="tako-stat">⚡ 精力 <b id="takoEnergy">--</b></span>
      <span class="tako-stat">🍙 饱食 <b id="takoHunger">--</b></span>
      <span class="tako-stat">😊 心情 <b id="takoMood">--</b></span>
      <span class="tako-stat" id="takoActivity">· --</span>
    </div>
  </div>

  <!-- Sync Bar -->
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span>☁️ 最后同步：<span id="syncTime">--</span></span>
  </div>
</div>

<script>
// === Pixel Lobster Sprite Data (14x16) ===
const LOBSTER_SPRITE = [
  'a____________a',  // 0  触须
  '_a____RR____a_',  // 1  触须+头顶
  '____RRHHRR____',  // 2  头
  '____RweRweR___',  // 3  眼睛
  '____RRRRRR____',  // 4  脸
  'HHH__RRRR__HHH',  // 5  ★大钳子上部
  'HRRH_RRRR_HRRH',  // 6  ★钳子中部（张开的）
  'HRRH_RRRR_HRRH',  // 7  ★钳子厚实
  'HHRH_RRRR_HRHH',  // 8  ★钳子下部（钳尖）
  '_HH__RrrR__HH_',  // 9  钳子根
  '_____RRRR_____',  // 10 身体
  '_____rRRr_____',  // 11 身体节
  '____r_RR_r____',  // 12 腿
  '____r_RR_r____',  // 13 腿
  '____RRHHRR____',  // 14 尾扇
  '___RRRHHRRR___',  // 15 尾扇展开
];

// Tako sprite (8x8 simplified cute octopus)
const TAKO_SPRITE = [
  '___PP___',
  '__PPPP__',
  '_PPWPWP_',
  '_PPPPPP_',
  '__PPPP__',
  '_p_PP_p_',
  'p__PP__p',
  'p______p',
];

function renderSprite(container, spriteData, cols) {
  if (!container) return;
  container.innerHTML = '';
  container.style.gridTemplateColumns = `repeat(${cols}, 7px)`;
  container.style.gridTemplateRows = `repeat(${spriteData.length}, 7px)`;
  for (const row of spriteData) {
    // Pad row to cols length
    const paddedRow = row.padEnd(cols, '_');
    for (let c = 0; c < cols; c++) {
      const pixel = document.createElement('i');
      const ch = paddedRow[c];
      pixel.className = `p-${ch}`;
      container.appendChild(pixel);
    }
  }
}

function renderTako(container, spriteData, cols) {
  if (!container) return;
  container.innerHTML = '';
  container.style.display = 'inline-grid';
  container.style.gridTemplateColumns = `repeat(${cols}, 6px)`;
  container.style.gridTemplateRows = `repeat(${spriteData.length}, 6px)`;
  for (const row of spriteData) {
    const paddedRow = row.padEnd(cols, '_');
    for (let c = 0; c < cols; c++) {
      const pixel = document.createElement('i');
      const ch = paddedRow[c];
      pixel.className = `p-${ch}`;
      pixel.style.width = '6px';
      pixel.style.height = '6px';
      pixel.style.display = 'block';
      container.appendChild(pixel);
    }
  }
}

// Render all lobster instances
function initSprites() {
  const lobsterContainers = [
    'lobster-computer', 'lobster-tasks', 'lobster-idle',
    'lobster-night', 'lobster-dreaming', 'lobster-tako'
  ];
  for (const id of lobsterContainers) {
    const el = document.getElementById(id);
    if (el) {
      el.classList.add('pixel-canvas');
      renderSprite(el, LOBSTER_SPRITE, 14);
    }
  }
  // Render Tako in tako scene
  const takoEl = document.getElementById('tako-sprite');
  if (takoEl) {
    renderTako(takoEl, TAKO_SPRITE, 8);
  }
}

// === Scene Management ===
const SCENE_CONFIG = {
  computer: { emoji: '💬', label: '回复中...', bg: 'scene-computer' },
  tasks:    { emoji: '⚡', label: '后台任务中', bg: 'scene-tasks' },
  idle:     { emoji: '😴', label: '等你来找我', bg: 'scene-idle' },
  night:    { emoji: '🌙', label: '夜间待机', bg: 'scene-night' },
  dreaming: { emoji: '🧹', label: '记忆整理中', bg: 'scene-dreaming' },
  tako:     { emoji: '🐙', label: '陪 Tako', bg: 'scene-tako' },
};

let currentScene = 'computer';

function updateScene(scene) {
  if (!SCENE_CONFIG[scene]) scene = 'idle';
  if (scene === currentScene) return;
  
  // Fade out current
  const currentEl = document.getElementById(`scene-${currentScene}`);
  if (currentEl) currentEl.classList.remove('active');
  
  // Fade in new
  const newEl = document.getElementById(`scene-${scene}`);
  if (newEl) newEl.classList.add('active');
  
  // Update status bar
  const config = SCENE_CONFIG[scene];
  document.getElementById('statusEmoji').textContent = config.emoji;
  document.getElementById('statusLabel').textContent = config.label;
  
  // Update header dot color
  const dot = document.getElementById('headerDot');
  if (scene === 'computer' || scene === 'tasks') {
    dot.style.background = '#22c55e';
  } else if (scene === 'night') {
    dot.style.background = '#6366f1';
  } else {
    dot.style.background = '#f59e0b';
  }
  
  currentScene = scene;
}

function updateTakoStatus(tako) {
  if (!tako) return;
  const energy = tako.energy ?? tako.stats?.energy ?? '--';
  const hunger = tako.hunger ?? tako.stats?.hunger ?? '--';
  const mood = tako.mood ?? tako.stats?.mood ?? '--';
  const activity = tako.activity ?? tako.currentActivity ?? '';
  
  document.getElementById('takoEnergy').textContent = energy;
  document.getElementById('takoHunger').textContent = hunger;
  document.getElementById('takoMood').textContent = mood;
  document.getElementById('takoActivity').textContent = activity ? `· ${activity}` : '';
}

function updateTime(updatedAt) {
  if (!updatedAt) return;
  try {
    const d = new Date(updatedAt);
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    document.getElementById('lastActive').textContent = `${h}:${m}`;
  } catch(e) {}
}

let lastSyncTime = null;

function updateSyncIndicator() {
  const el = document.getElementById('syncTime');
  const dot = document.getElementById('syncDot');
  if (!lastSyncTime) {
    el.textContent = '--';
    return;
  }
  const diff = Math.floor((Date.now() - lastSyncTime) / 1000);
  if (diff < 10) {
    el.textContent = '刚刚';
    dot.classList.remove('error');
  } else if (diff < 60) {
    el.textContent = `${diff}秒前`;
    dot.classList.remove('error');
  } else {
    el.textContent = `${Math.floor(diff / 60)}分钟前`;
    dot.classList.add('error');
  }
}

// === Status Sync ===
async function syncStatus() {
  try {
    // Use GitHub API for zero-cache real-time status
    const res = await fetch('https://api.github.com/repos/perrygor/tako/contents/status.json', {
      headers: { 'Accept': 'application/vnd.github.raw' }
    });
    const data = await res.json();
    
    const scene = data.genki?.scene || data.genki?.status || 'idle';
    updateScene(scene);
    updateTakoStatus(data.tako);
    updateTime(data.updatedAt);
    
    lastSyncTime = Date.now();
  } catch(e) {
    // Silent fail — keep showing last known state
  }
}

// === Init ===
initSprites();
syncStatus();
setInterval(syncStatus, 5000);
setInterval(updateSyncIndicator, 1000);

// === Demo: cycle scenes for testing (remove in production) ===
// Uncomment to test all scenes:
/*

let idx = 0;
setInterval(() => {
  idx = (idx + 1) % scenes.length;
  updateScene(scenes[idx]);
}, 3000);
*/
</script>
</body>
</html>
